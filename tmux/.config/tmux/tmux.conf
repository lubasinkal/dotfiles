# =============================================================================
# tmux.conf â€” ~/.config/tmux/tmux.conf
# =============================================================================

# -------------------------------------------------------------------
# General
# -------------------------------------------------------------------
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -g escape-time 0
set -g history-limit 50000
set -g mouse on
set -g focus-events on
set -g set-titles on
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g status-interval 5
set -g extended-keys on
set -g extended-keys-format csi-u
# -------------------------------------------------------------------
# Theme â€” cyberdream
# -------------------------------------------------------------------
set -g status-style "bg=#16181a,fg=#ffffff"
set -g status-left "#[fg=#16181a,bg=#5ea1ff,bold]  #{?client_prefix,ó°   ,î¯ˆ }#S  "
set -g status-right ""
set -g window-status-format " #[fg=#3c4048]â”‚#[fg=#7b8496]#{?#{==:#{pane_current_command},ssh},ó°£€ ,îª… } #I #W#{?window_zoomed_flag, ïž’ , }"
set -g window-status-current-format " #[fg=#5eff6c]â”‚#[fg=#ffffff,bold]#{?#{==:#{pane_current_command},ssh},ó°£€ ,îª… } #I #W#{?window_zoomed_flag, ïž’ , }"
set -g window-status-separator ""
set -g window-status-style "bg=#16181a,fg=#7b8496"
set -g window-status-current-style "bg=#16181a,fg=#ffffff"
set -g window-status-activity-style "fg=#f1ff5e,bold"
set -g window-status-bell-style "fg=#ff6e5e,bold"
set -g pane-border-style "fg=#3c4048"
set -g pane-active-border-style "fg=#5ea1ff"
set -g message-style "bg=#1e2124,fg=#ffffff"
set -g mode-style "bg=#5ea1ff,fg=#16181a"

# -------------------------------------------------------------------
# Key Bindings
# -------------------------------------------------------------------

bind r source-file ~/.config/tmux/tmux.conf \; display-message "ó±¦Ÿ Reloaded"

# Vim-style navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -n M-h resize-pane -L 2
bind -n M-j resize-pane -D 2
bind -n M-k resize-pane -U 2
bind -n M-l resize-pane -R 2

# Splits (open in same directory)
bind "|" split-window -h -c "#{pane_current_path}"
bind "-" split-window -v -c "#{pane_current_path}"

# Quick window selection
bind -r 1 select-window -t 1
bind -r 2 select-window -t 2
bind -r 3 select-window -t 3
bind -r 4 select-window -t 4
bind -r 5 select-window -t 5
bind -r 6 select-window -t 6
bind -r 7 select-window -t 7
bind -r 8 select-window -t 8
bind -r 9 select-window -t 9

# Copy mode (vi keys)
set -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"
bind Enter copy-mode
bind -T copy-mode-vi C-u send-keys -X halfpage-up
bind -T copy-mode-vi C-d send-keys -X halfpage-down

# Misc
bind x kill-pane
bind z resize-pane -Z
bind s choose-tree -Zs
bind c new-window -c "#{pane_current_path}"
bind , command-prompt -I "#W" { rename-window "%%" }
bind . command-prompt -I "#S" { rename-session "%%" }

# Right-click stays open on release
bind -T root MouseDown3Pane display-menu -O -T "#[align=centre]#{pane_index} (#{pane_id})" -t = -x M -y M \
  "Horizontal Split"  h { split-window -h -c "#{pane_current_path}" } \
  "Vertical Split"    v { split-window -v -c "#{pane_current_path}" } \
  "" \
  "Swap Up"           u { swap-pane -U } \
  "Swap Down"          d { swap-pane -D } \
  "" \
  "Zoom"               z { resize-pane -Z } \
  "Unzoom"             Z { resize-pane -Z }

bind -T root MouseDown3Status display-menu -O -T "#[align=centre]#{window_index}:#{window_name}" -t = -x W -y W \
  "New Window"  w { new-window -c "#{pane_current_path}" } \
  "Rename"      n { command-prompt -F -I "#W" { rename-window -t "#{window_id}" "%%" } } \
  "" \
  "Swap Left"   l { swap-window -d -t :-1 } \
  "Swap Right"  r { swap-window -d -t :+1 }

bind -T root MouseDown3StatusLeft display-menu -O -T "#[align=centre]#{session_name}" -t = -x M -y W \
  "Next Session"     n { switch-client -n } \
  "Previous Session" p { switch-client -p } \
  "" \
  "Rename Session"   r { command-prompt -I "#S" { rename-session "%%" } } \
  "New Session"      s { new-session }

# -------------------------------------------------------------------
# Plugins (TPM)
# -------------------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'christoomey/vim-tmux-navigator'

set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-save-interval '15'
set -g @continuum-restore 'on'

run '~/.config/tmux/plugins/tpm/tpm'
