# ── Theme ─────────────────────────────────────────────────────────
[theme]
name = "terminal"                          # follow host terminal ANSI palette

[theme.custom]
accent = "#5ef1ff"                         # cyberdream cyan
blue   = "#5ea1ff"
green  = "#5eff6c"
red    = "#ff6e5e"
yellow = "#f1ff5e"
purple = "#bd5eff"
pink   = "#ff5ea0"
orange = "#ffbd5e"

# ── UI ────────────────────────────────────────────────────────────
[ui]
accent                      = "#5ef1ff"    # cyberdream cyan for borders & highlights
pane_borders                = true
pane_gaps                   = true         # visual separation between splits
hide_tab_bar_when_single_tab = true
confirm_close               = true         # prompt before closing workspace
prompt_new_tab_name         = false        # auto-name tabs for speed
copy_on_select              = true
sidebar_collapsed_mode      = "compact"    # slim rail when collapsed

# ── Sidebar ───────────────────────────────────────────────────────
[ui.sidebar]
row_gap = 0

[ui.sidebar.agents]
row_gap = 0
rows = [
  ["state_icon", "workspace", "tab"],
  ["agent"],
]

[ui.sidebar.spaces]
row_gap = 0
rows = [
  ["state_icon", "workspace"],
  ["branch", "git_status"],
]

# ── Sound & Notifications ─────────────────────────────────────────
[ui.sound]
enabled = true

[ui.toast]
delivery = "herdr"
delay_seconds = 1

[ui.toast.herdr]
position = "bottom-right"

[ui.toast.clipboard]
enabled = true

# ── Keys ──────────────────────────────────────────────────────────
[keys]
prefix = "ctrl+b"
